# Site Settings
locale                   : "en-US"
title                    : "Ullas Rajvanshi"
title_separator          : "-"
name                     : &name "Ullas Rajvanshi"
description              : &description "Strategy Consultant | Data & AI | Amsterdam"
url                      : https://ullasrajvanshi.github.io  # ← change to your actual GitHub username
baseurl                  : ""
repository               : "ullasrajvanshi/ullasrajvanshi.github.io"  # ← change to your actual GitHub username

# Author Info
author:
  name             : "Ullas Rajvanshi"
  avatar           : "profile.jpeg"
  bio              : "Strategy Consultant with 5+ years in the Dutch market, advising large-scale organisations on Data, Analytics & AI."
  location         : "Amsterdam, Netherlands"
  employer         : "Accenture"
  email            : "ullasrajvanshi@gmail.com"
  uri              :
  linkedin         : "ullasrajvanshi"
  github           : "ullasrajvanshi"  # ← change to your actual GitHub username
  twitter          :

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README
  - node_modules
  - tmp

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Europe/Amsterdam

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clipping: io
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: development
